<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23120a1e'/%3E%3Ctext x='16' y='23' font-family='serif' font-size='20' fill='%23e8b765' text-anchor='middle'%3E%E2%97%86%3C/text%3E%3C/svg%3E" />
<title>TWILIGHT RELICS — 薄暮遺跡</title>
<style>
  :root {
    --gold: #e8b765;
    --gold-dim: #8a6a3a;
    --cyan: #7be8d8;
    --bg: #120a1e;
    --fg: #d8cfc0;
    --hp: #c84f4f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: var(--fg);
    font-family: 'Georgia', 'Noto Serif TC', serif;
    overflow: hidden; user-select: none;
  }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; display: none; }
  #hud.on { display: block; }

  #crosshair {
    position: absolute; left: 50%; top: 50%;
    width: 6px; height: 6px; margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: rgba(232,183,101,.9);
    box-shadow: 0 0 8px rgba(232,183,101,.7);
  }
  #crosshair::after {
    content: ''; position: absolute; left: 50%; top: 50%;
    width: 26px; height: 26px; margin: -13px 0 0 -13px;
    border: 1px solid rgba(232,183,101,.35); border-radius: 50%;
  }

  #hpbar {
    position: absolute; left: 28px; bottom: 28px;
    width: 240px; height: 14px;
    border: 1px solid var(--gold-dim);
    background: rgba(0,0,0,.45);
    box-shadow: 0 0 16px rgba(0,0,0,.5);
  }
  #hpfill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #8c2f2f, var(--hp));
    transition: width .25s ease;
  }
  #hplabel {
    position: absolute; left: 28px; bottom: 48px;
    font-size: 12px; letter-spacing: 3px; color: var(--gold-dim);
  }

  #relics {
    position: absolute; right: 28px; bottom: 24px;
    display: flex; gap: 10px;
  }
  .relic-slot {
    width: 22px; height: 22px;
    transform: rotate(45deg);
    border: 1px solid var(--gold-dim);
    background: rgba(0,0,0,.4);
    transition: all .4s ease;
  }
  .relic-slot.got {
    background: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 14px var(--cyan);
  }

  #hint {
    position: absolute; left: 50%; bottom: 70px; transform: translateX(-50%);
    font-size: 15px; letter-spacing: 2px; color: var(--gold);
    text-shadow: 0 0 12px rgba(0,0,0,.9), 0 2px 4px #000;
    opacity: 0; transition: opacity .5s;
    text-align: center; white-space: nowrap;
  }
  #hint.show { opacity: 1; }

  #dash-cd {
    position: absolute; left: 50%; top: calc(50% + 30px); transform: translateX(-50%);
    width: 44px; height: 3px; background: rgba(255,255,255,.12);
    opacity: 0; transition: opacity .3s;
  }
  #dash-cd.show { opacity: 1; }
  #dash-fill { height: 100%; background: var(--cyan); width: 0%; }

  #vignette-hurt {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(160,20,20,.55) 100%);
    opacity: 0; transition: opacity .15s;
  }

  /* ---------- 畫面（標題 / 結局） ---------- */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 35%, rgba(40,22,66,.92), rgba(8,4,16,.97));
    text-align: center; transition: opacity .8s ease;
  }
  .screen.fade { opacity: 0; pointer-events: none; }
  .screen h1 {
    font-size: clamp(38px, 7vw, 72px);
    letter-spacing: 14px; font-weight: normal;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(232,183,101,.45);
    margin-bottom: 6px;
  }
  .screen .sub {
    font-size: 15px; letter-spacing: 8px; color: var(--gold-dim);
    margin-bottom: 38px;
  }
  .screen .story {
    max-width: 520px; line-height: 2; font-size: 15px;
    color: var(--fg); opacity: .85; margin-bottom: 38px; padding: 0 24px;
  }
  .btn {
    pointer-events: auto; cursor: pointer;
    padding: 13px 52px;
    border: 1px solid var(--gold-dim); color: var(--gold);
    font-family: inherit; font-size: 16px; letter-spacing: 6px;
    background: rgba(232,183,101,.06);
    transition: all .25s;
  }
  .btn:hover { background: rgba(232,183,101,.18); box-shadow: 0 0 24px rgba(232,183,101,.25); }
  .controls {
    margin-top: 44px; font-size: 12.5px; letter-spacing: 2px;
    color: #8d8478; line-height: 2.1;
  }
  .controls b { color: var(--gold); font-weight: normal; }
  #loading { font-size: 13px; letter-spacing: 4px; color: var(--gold-dim); margin-top: 30px; }

  #end-screen { display: none; }
  #end-screen.on { display: flex; }
  #end-screen h1.win { color: var(--cyan); text-shadow: 0 0 36px rgba(123,232,216,.5); }
  #end-screen h1.lose { color: var(--hp); text-shadow: 0 0 36px rgba(200,79,79,.45); }
  #end-stats { font-size: 14px; letter-spacing: 3px; color: var(--fg); opacity: .75; margin-bottom: 36px; line-height: 2; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="hud">
  <div id="vignette-hurt"></div>
  <div id="crosshair"></div>
  <div id="dash-cd"><div id="dash-fill"></div></div>
  <div id="hplabel">生命</div>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="relics">
    <div class="relic-slot"></div><div class="relic-slot"></div><div class="relic-slot"></div>
    <div class="relic-slot"></div><div class="relic-slot"></div>
  </div>
  <div id="hint"></div>
</div>

<div id="title-screen" class="screen">
  <h1>薄暮遺跡</h1>
  <div class="sub">TWILIGHT RELICS</div>
  <div class="story">
    永晝將盡的孤島上，五枚薄暮聖物散落於古老遺跡之間。<br/>
    殘影守衛徘徊不去——取回聖物，點亮歸途之門。
  </div>
  <button class="btn" id="start-btn">啟 程</button>
  <div class="controls">
    <b>WASD</b> 移動　<b>滑鼠</b> 視角　<b>左鍵</b> 步槍連射　<b>右鍵</b> 瞄準<br/>
    <b>Shift</b> 奔跑　<b>空白鍵</b> 翻滾閃避（無敵幀）
  </div>
  <div id="loading">— 喚醒島嶼中 —</div>
</div>

<div id="end-screen" class="screen">
  <h1 id="end-title"></h1>
  <div class="sub" id="end-sub"></div>
  <div id="end-stats"></div>
  <button class="btn" id="retry-btn">再 行</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
