<html lang="zh-Hant">
<head>

<title>Suno 曲風大百科 · Style Prompt Library</title>
<style>
:root{

  --line2:rgba(240,195,137,.3); --text:#f3ead9; --dim:#b6a384; --faint:#7c6e58;
  --amber:#f0c389; --amber-b:#ffdba6; --cyan:#9ecadf; --code-bg:#0e0b07;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:radial-gradient(120% 60% at 50% -10%, rgba(240,195,137,.10), transparent 60%),
    linear-gradient(180deg,#14100c,#1a140d 60%,#0f0c08);
  color:var(--text);line-height:1.7;min-height:100vh;-webkit-font-smoothing:antialiased;padding:0 0 90px}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
header{text-align:center;padding:46px 0 16px}
.kicker{font-size:13px;letter-spacing:.28em;color:var(--amber);text-transform:uppercase;margin-bottom:12px}
h1{font-size:clamp(26px,4.6vw,40px);font-weight:900;line-height:1.2;
  background:linear-gradient(120deg,var(--amber-b),var(--amber) 55%,var(--cyan));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--dim);margin-top:12px;font-size:14.5px}

.controls{position:sticky;top:0;z-index:20;padding:16px 0 14px;margin-top:14px;
  background:linear-gradient(180deg,#14100c 70%,rgba(20,16,12,0));backdrop-filter:blur(4px)}
#search{width:100%;padding:13px 17px;font-size:15px;font-family:inherit;color:var(--text);
  background:var(--card);border:1px solid var(--line2);border-radius:12px;outline:none}
#search:focus{border-color:var(--amber)}
#search::placeholder{color:var(--faint)}
.cats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.cat-chip{font-size:13px;color:var(--dim);border:1px solid var(--line);border-radius:999px;
  padding:6px 14px;cursor:pointer;transition:.15s;white-space:nowrap;background:var(--card2)}
.cat-chip:hover{color:var(--amber);border-color:var(--line2)}
.cat-chip.active{background:rgba(240,195,137,.16);color:var(--amber-b);border-color:var(--line2)}
.count{color:var(--faint);font-size:13px;margin-top:10px;text-align:center}

.cat-head{font-size:14px;letter-spacing:.14em;color:var(--amber-b);text-transform:uppercase;
  font-weight:800;margin:36px 0 14px;padding-bottom:9px;border-bottom:1px solid var(--line)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.style-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px;
  display:flex;flex-direction:column;transition:.15s}
.style-card:hover{border-color:var(--line2)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
.sc-name{font-size:16.5px;font-weight:800;color:var(--amber-b);line-height:1.3}
.sc-en{font-size:12.5px;color:var(--faint);font-weight:400}
.sc-bpm{flex:0 0 auto;font-size:11.5px;color:var(--cyan);border:1px solid rgba(158,202,223,.3);
  border-radius:6px;padding:2px 8px;white-space:nowrap;margin-top:2px}
.sc-desc{font-size:13px;color:var(--dim);margin:4px 0 10px}
.sc-prompt{background:var(--code-bg);border:1px solid var(--line);border-radius:9px;padding:11px 12px;
  font-family:"JetBrains Mono",Consolas,monospace;font-size:11.5px;line-height:1.55;color:var(--cyan);
  flex:1;margin-bottom:10px}
.copy-btn{font-family:inherit;cursor:pointer;border:1px solid var(--line2);background:rgba(240,195,137,.08);
  color:var(--amber);border-radius:8px;padding:8px 0;font-size:13px;font-weight:600;transition:.15s;width:100%}
.copy-btn:hover{background:rgba(240,195,137,.18)}
.copy-btn.done{background:rgba(150,220,150,.16);border-color:rgba(150,220,150,.4);color:#9fe0a0}
.btn-row{display:flex;gap:8px}
.btn-row .copy-btn{flex:1}
.play-btn{flex:0 0 auto;cursor:pointer;border:1px solid rgba(255,120,120,.35);background:rgba(255,90,90,.1);
  color:#ff9b9b;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:600;font-family:inherit;transition:.15s;white-space:nowrap}
.play-btn:hover{background:rgba(255,90,90,.2)}
.sc-rep{font-size:12.5px;color:var(--amber);margin:0 0 10px;line-height:1.4}
.sc-rep b{color:var(--amber-b);font-weight:600}
.empty{text-align:center;color:var(--faint);padding:50px 0;font-size:15px}
footer{text-align:center;color:var(--faint);font-size:13px;margin-top:50px}
.player{position:fixed;left:0;right:0;bottom:0;z-index:60;transform:translateY(115%);transition:.32s cubic-bezier(.4,0,.2,1);
  background:#1b1610;border-top:1px solid var(--line2);box-shadow:0 -12px 44px rgba(0,0,0,.65)}
.player.show{transform:translateY(0)}
.player-inner{max-width:1080px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:16px}
.player iframe{width:240px;height:135px;border:0;border-radius:9px;flex:0 0 auto;background:#000}
.player-meta{flex:1;min-width:0}
.pl-now{font-size:11px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
.pl-label{font-size:15.5px;color:var(--amber-b);font-weight:700;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-yt{font-size:13px;color:var(--cyan);text-decoration:none}
.pl-yt:hover{text-decoration:underline}
.pl-close{flex:0 0 auto;background:none;border:1px solid var(--line2);color:var(--dim);border-radius:8px;
  width:36px;height:36px;cursor:pointer;font-size:16px;transition:.15s}
.pl-close:hover{color:var(--text);background:rgba(255,255,255,.06)}
@media(max-width:560px){.player iframe{width:128px;height:72px}.player-inner{padding:10px 12px;gap:11px}.pl-label{font-size:13.5px}}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#2a2014;border:1px solid var(--line2);color:var(--amber-b);padding:11px 22px;
  border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;
  z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

</div>

const cats = ['全部', ...DATA.map(d=>d.cat)];
let activeCat = '全部';
const catsEl = document.getElementById('cats');
cats.forEach(c=>{
  const b=document.createElement('div'); b.className='cat-chip'+(c==='全部'?' active':'');
  b.textContent=c.split(' ')[0]; b.title=c;
  b.onclick=()=>{activeCat=c;document.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  catsEl.appendChild(b);
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const list=document.getElementById('list'); list.innerHTML='';
  let n=0;
  DATA.forEach(group=>{
    if(activeCat!=='全部' && group.cat!==activeCat) return;
    const matched=group.items.filter(it=>{
      if(!q) return true;
      return (it.zh+' '+it.en+' '+it.desc+' '+it.p).toLowerCase().includes(q);
    });
    if(!matched.length) return;
    const head=document.createElement('div'); head.className='cat-head'; head.textContent=group.cat; list.appendChild(head);
    const grid=document.createElement('div'); grid.className='grid';
    matched.forEach(it=>{
      n++;
      const card=document.createElement('div'); card.className='style-card';
      const rep=REP[it.en]||'';
      card.innerHTML=
        '<div class="sc-top"><div><div class="sc-name">'+esc(it.zh)+'</div>'+
        '<div class="sc-en">'+esc(it.en)+'</div></div>'+
        '<div class="sc-bpm">'+esc(it.bpm)+' BPM</div></div>'+
        '<div class="sc-desc">'+esc(it.desc)+'</div>'+
        (rep?'<div class="sc-rep">🎧 代表：<b>'+esc(rep)+'</b></div>':'')+
        '<div class="sc-prompt">'+esc(it.p)+'</div>'+
        '<div class="btn-row"><button class="play-btn">▶ YouTube 聽</button><button class="copy-btn">複製曲風</button></div>';
      const cb=card.querySelector('.copy-btn'); cb.onclick=()=>copy(it.p,cb);
      const pb=card.querySelector('.play-btn'); pb.onclick=()=>play(it.en,it.zh,rep);
      grid.appendChild(card);
    });
    list.appendChild(grid);
  });
  if(!n) list.innerHTML='<div class="empty">找不到符合的曲風，換個關鍵字試試～</div>';
  document.getElementById('count').textContent='共 '+countAll()+' 種曲風'+(q||activeCat!=='全部'?'，目前顯示 '+n+' 種':'');
}
function countAll(){return DATA.reduce((s,g)=>s+g.items.length,0);}
function copy(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{
    const old=btn.textContent; btn.textContent='已複製 ✓'; btn.classList.add('done');
    const t=document.getElementById('toast'); t.classList.add('show');
    setTimeout(()=>{btn.textContent=old;btn.classList.remove('done');},1600);
    setTimeout(()=>t.classList.remove('show'),1600);
  }).catch(()=>{btn.textContent='複製失敗';});
}
